# ============================================================================
# mcp-auth values
# ============================================================================
# Inbound caller identity comes from an auth.romaine.life role=admin JWT
# verified by the shared romaine-auth package — same shape as
# mcp-glimmung / mcp-k8s / mcp-argocd / mcp-azure-personal. Outbound calls
# to auth.romaine.life's admin endpoints forward the inbound caller's
# JWT directly (no separate service-to-service credential).

image:
  repository: romainecr.azurecr.io/mcp-auth
  tag: "mcp-auth-0cfe1423b7ec148bb8e4d9099f46bfdaa016775f17afc58a7508465fc2c2a34b"
  pullPolicy: IfNotPresent

port: 8080

authRomaineLife:
  issuer: https://auth.romaine.life
  jwksUrl: https://auth.romaine.life/api/auth/jwks

# auth.romaine.life base URL the admin tools call through.
authService:
  baseUrl: https://auth.romaine.life

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
